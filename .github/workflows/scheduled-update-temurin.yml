name: Update temurin SDK List

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  update-temurin:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Python
        uses: actions/setup-python@v6.2.0
      - name: Run update script
        run: python .github/scripts/update_temurin.py
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update temurin SDK list"
          branch: chore/update-temurin
          delete-branch: true
          title: "Chore: Update temurin SDK list"
          body: |
            Automated update of `java/temurin.json` from the temurin release API.
            Generated by the `scheduled-update-temurin` workflow.
          labels: automated
          add-paths: java/temurin.json

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --squash "chore/update-temurin" || true